    <!-- E Letter -->
    <path d="M12 20h14M12 32h11M12 44h14" stroke="#050f0e" stroke-width="3" stroke-linecap="round" style="fill:none;stroke:rgb(5, 15, 14);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- A Letter -->
