  <g transform="translate(197, 124)" style="fill:none;stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <rect x="0" y="0" width="16" height="16" rx="4" fill="url(#grad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <text x="4" y="12" font-family="system-ui, sans-serif" font-weight="800" font-size="10" fill="#050f0e" style="fill:rgb(5, 15, 14);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:10px;font-weight:800;text-anchor:start;dominant-baseline:auto">E</text>
    <text x="22" y="12" font-family="system-ui, sans-serif" font-weight="800" font-size="12" fill="url(#gradH)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:12px;font-weight:800;text-anchor:start;dominant-baseline:auto">EA</text>
    <text x="42" y="12" font-family="system-ui, sans-serif" font-weight="700" font-size="12" fill="#e8faf8" style="fill:rgb(232, 250, 248);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:12px;font-weight:700;text-anchor:start;dominant-baseline:auto">Dev</text>
    <text x="68" y="12" font-family="system-ui, sans-serif" font-weight="400" font-size="10" fill="#2dd4bf" style="fill:rgb(45, 212, 191);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:10px;font-weight:400;text-anchor:start;dominant-baseline:auto">Lab</text>
