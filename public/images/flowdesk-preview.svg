<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#0F172A"/>
  <!-- Helpdesk UI mockup -->
  <rect x="50" y="50" width="700" height="400" rx="16" fill="#1E293B" stroke="#334155" stroke-width="2"/>
  <!-- Header -->
  <rect x="50" y="50" width="700" height="60" rx="16" fill="#0F172A"/>
  <circle cx="90" cy="80" r="16" fill="#14B8A6"/>
  <rect x="120" y="72" width="100" height="16" rx="4" fill="white"/>
  <rect x="620" y="68" width="100" height="24" rx="12" fill="#14B8A6"/>
  <!-- Ticket list -->
  <rect x="70" y="130" width="260" height="300" rx="12" fill="#0F172A"/>
  <text x="90" y="160" font-family="system-ui" font-size="14" font-weight="600" fill="#64748B">OPEN TICKETS</text>
  <!-- Ticket items -->
  <rect x="85" y="180" width="230" height="60" rx="8" fill="#1E293B" stroke="#14B8A6" stroke-width="2"/>
  <rect x="100" y="195" width="150" height="12" rx="4" fill="white"/>
  <rect x="100" y="215" width="100" height="10" rx="4" fill="#64748B"/>
  <rect x="85" y="255" width="230" height="60" rx="8" fill="#1E293B"/>
  <rect x="100" y="270" width="140" height="12" rx="4" fill="white"/>
  <rect x="100" y="290" width="80" height="10" rx="4" fill="#64748B"/>
  <rect x="85" y="330" width="230" height="60" rx="8" fill="#1E293B"/>
  <rect x="100" y="345" width="130" height="12" rx="4" fill="white"/>
  <rect x="100" y="365" width="90" height="10" rx="4" fill="#64748B"/>
  <!-- Ticket detail -->
  <rect x="350" y="130" width="380" height="300" rx="12" fill="#0F172A"/>
  <rect x="370" y="150" width="200" height="20" rx="4" fill="white"/>
  <rect x="370" y="180" width="100" height="24" rx="12" fill="#14B8A6"/>
  <rect x="480" y="180" width="80" height="24" rx="12" fill="#FCD34D"/>
  <rect x="370" y="220" width="340" height="12" rx="4" fill="#64748B"/>
  <rect x="370" y="245" width="300" height="12" rx="4" fill="#64748B"/>
  <rect x="370" y="270" width="280" height="12" rx="4" fill="#64748B"/>
  <!-- Reply box -->
  <rect x="370" y="350" width="340" height="60" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="385" y="365" width="200" height="10" rx="4" fill="#475569"/>
</svg>
