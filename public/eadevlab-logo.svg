    <!-- EA text -->
    <text x="68" y="40" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="36" fill="url(#gradH)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:36px;font-weight:800;text-anchor:start;dominant-baseline:auto">EA</text>

